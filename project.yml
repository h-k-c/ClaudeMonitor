name: ClaudeMonitor
options:
  bundleIdPrefix: com.claude-monitor
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  ClaudeMonitor:
    type: application
    platform: macOS
    sources:
      - path: ClaudeMonitor
        excludes:
          - "**/.DS_Store"
    dependencies:
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude-monitor.app
        PRODUCT_NAME: Claude Monitor
        INFOPLIST_FILE: ClaudeMonitor/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        LSUIElement: YES
